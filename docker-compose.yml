version: '3.8'

services:
  flash-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flash-ui
    ports:
      - "3001:3001"  # Exposes the Node Server port 3001
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PUID=99
      - PGID=100
      - TZ=UTC
