version: '3.8'

services:
  flash-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flash-ui
    ports:
      - "8080:80"  # Exposes the NGINX container port 80 to your UnRaid server's port 8080
    env_file:
      - .env
    restart: unless-stopped
    # Useful defaults for UnRaid
    environment:
      - PUID=99
      - PGID=100
      - TZ=UTC
